<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .loader { border-top-color: #818cf8; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #auth-screen, #dashboard-screen { display: none; }
        #auth-screen.flex { display: flex; }
        #dashboard-screen.flex { display: flex; }
        
        #loading-screen { 
            position: fixed; inset: 0; background: #0f172a; 
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        .topic-item.active { background: rgba(99, 102, 241, 0.2); border-left: 4px solid #6366f1; }
        .topic-item.completed { opacity: 0.6; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loading-screen">
        <div class="loader w-12 h-12 border-4 rounded-full"></div>
    </div>

    <!-- Giriş Ekranı -->
    <div id="auth-screen" class="items-center justify-center min-h-screen">
        <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold gradient-text italic">StudyFlow AI</h1>
                <p class="text-gray-400 mt-2">Akıllı Ders Çalışma Platformu</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="E-Posta" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:border-indigo-500 outline-none transition-all">
                <input type="password" id="auth-password" placeholder="Şifre" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:border-indigo-500 outline-none transition-all">
                <div class="flex flex-col gap-3 pt-2">
                    <button id="login-btn" onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition transform active:scale-95">Giriş Yap</button>
                    <button id="signup-btn" onclick="handleSignup()" class="w-full bg-white/5 hover:bg-white/10 text-indigo-400 py-3 rounded-xl border border-white/10 transition transform active:scale-95">Yeni Hesap Oluştur</button>
                </div>
            </div>
            <div id="auth-error" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/40 text-red-200 text-xs rounded-lg text-center leading-relaxed"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-screen" class="min-h-screen flex-col">
        <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg shadow-lg"><i data-lucide="graduation-cap" class="text-white w-6 h-6"></i></div>
                <span class="text-xl font-bold gradient-text">StudyFlow AI</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showModal('add-course-modal')" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition flex items-center gap-2 text-sm font-bold shadow-lg">
                    <i data-lucide="plus" class="w-4 h-4"></i> Yeni Ders Planla
                </button>
                <button onclick="handleLogout()" class="p-2 text-gray-400 hover:text-white transition"><i data-lucide="log-out"></i></button>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-8 flex-1">
            <header class="mb-10">
                <h2 class="text-3xl font-bold flex items-center gap-3"><i data-lucide="layout-dashboard" class="text-indigo-400"></i> Akademik Programım</h2>
                <p class="text-gray-500 mt-1">Derslerin ve videoların burada seni bekliyor.</p>
            </header>
            <div id="course-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </main>
    </div>

    <!-- Çalışma Modülü (Full Screen Custom) -->
    <div id="study-mode" class="hidden fixed inset-0 z-[60] bg-slate-950 flex flex-col md:flex-row overflow-hidden">
        <!-- Sol: Video Player -->
        <div class="flex-1 relative flex flex-col bg-black">
            <div class="p-4 flex items-center justify-between border-b border-white/5 bg-slate-900/50">
                <button onclick="exitStudyMode()" class="bg-white/10 backdrop-blur-md text-white px-4 py-2 rounded-lg hover:bg-white/20 transition-all flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Geri
                </button>
                <h3 id="study-course-title" class="font-bold text-lg text-white">Ders Başlığı</h3>
                <div class="w-20"></div> <!-- Dengeleyici -->
            </div>
            <div class="flex-1 flex items-center justify-center p-4">
                <div id="video-container" class="w-full aspect-video max-w-5xl shadow-2xl rounded-2xl overflow-hidden border border-white/10 bg-slate-900"></div>
            </div>
        </div>

        <!-- Sağ: Konu Listesi ve AI -->
        <div class="w-full md:w-[400px] lg:w-[450px] glass h-full flex flex-col border-l border-white/10">
            <div class="p-6 border-b border-white/10">
                <h4 class="font-bold text-white uppercase tracking-widest text-xs mb-4">Ders İçeriği</h4>
                <div id="topic-list-sidebar" class="space-y-2 overflow-y-auto max-h-[40vh] custom-scrollbar">
                    <!-- Konu listesi buraya gelecek -->
                </div>
            </div>

            <!-- AI Notlar Bölümü -->
            <div class="flex-1 flex flex-col overflow-hidden bg-slate-900/40">
                <div class="p-6 flex-1 overflow-y-auto custom-scrollbar">
                    <div class="flex items-center gap-2 text-purple-400 font-bold mb-4 uppercase tracking-wider text-xs">
                        <i data-lucide="sparkles" class="w-5 h-5"></i> AI Çalışma Notları
                    </div>
                    <div id="ai-summary-text" class="text-gray-300 leading-relaxed text-sm prose prose-invert whitespace-pre-wrap italic">
                        Henüz not oluşturulmadı. Aşağıdaki butona basarak başlayın.
                    </div>
                </div>
                
                <div class="p-6 border-t border-white/10 bg-slate-900/80">
                    <button id="generate-ai-btn" onclick="window.requestAIUpdate()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl transition flex items-center justify-center gap-3 shadow-xl">
                        <i data-lucide="zap" class="w-5 h-5 fill-current"></i>
                        <span id="ai-btn-text">✨ AI Notlarını Oluştur</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="add-course-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="glass p-8 rounded-3xl w-full max-w-3xl shadow-2xl relative max-h-[90vh] flex flex-col border border-white/10">
            <button onclick="closeModal('add-course-modal')" class="absolute top-6 right-6 text-gray-400 hover:text-white transition"><i data-lucide="x"></i></button>
            <h3 class="text-2xl font-bold mb-6">Yeni Müfredat Planla</h3>
            <div class="space-y-6 overflow-y-auto pr-4 custom-scrollbar flex-1">
                <input type="text" id="course-name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-lg text-white focus:border-indigo-500 outline-none" placeholder="Ders Adı (Örn: AYT Fizik)">
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Konu Listesi</label>
                        <button onclick="window.addTopicField()" class="text-xs bg-indigo-600/20 text-indigo-400 px-4 py-2 rounded-xl border border-indigo-500/30 hover:bg-indigo-600 hover:text-white transition-all font-bold">+ Konu Ekle</button>
                    </div>
                    <div id="topics-container" class="space-y-4"></div>
                </div>
            </div>
            <div class="pt-8 mt-4 border-t border-white/5">
                <button id="save-course-btn" onclick="window.saveCourse()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl transition flex items-center justify-center gap-3">
                    Müfredatı Kaydet
                </button>
            </div>
        </div>
    </div>

    <div id="notification-area" class="fixed top-4 right-4 z-[1000] space-y-2 pointer-events-none"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = "https://ihkermhphlquvwklwtun.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_HsvhilHIDDBQezTDiKvkmg_G5y7vELZ"; 
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let courses = [];
        let activeCourse = null;
        let topicIndex = 0;

        // UI
        function showNotify(msg, type = "error") {
            const area = document.getElementById('notification-area');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl border pointer-events-auto transition-all duration-300 transform translate-x-full ${type === 'success' ? 'bg-green-900 border-green-500' : 'bg-red-900 border-red-500'}`;
            toast.textContent = msg;
            area.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function updateScreens(user) {
            document.getElementById('loading-screen').style.display = 'none';
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'flex';
                fetchCourses();
            } else {
                document.getElementById('dashboard-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'flex';
            }
            lucide.createIcons();
        }

        // AUTH
        window.handleLogin = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) showNotify(error.message);
        };

        window.handleSignup = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) showNotify(error.message);
            else showNotify("Başarıyla kaydoldunuz!", "success");
        };

        window.handleLogout = async () => { await supabaseClient.auth.signOut(); location.reload(); };

        supabaseClient.auth.onAuthStateChange((_, session) => {
            currentUser = session?.user;
            updateScreens(currentUser);
        });

        // INIT
        const { data: { session } } = await supabaseClient.auth.getSession();
        currentUser = session?.user;
        updateScreens(currentUser);

        // DATA
        window.addTopicField = () => {
            const container = document.getElementById('topics-container');
            const currentIdx = topicIndex++;
            const div = document.createElement('div');
            div.className = "p-4 bg-white/5 rounded-xl border border-white/5 space-y-2 relative group";
            div.id = `topic-row-${currentIdx}`;
            div.innerHTML = `
                <button onclick="document.getElementById('topic-row-${currentIdx}').remove()" class="absolute top-2 right-2 text-gray-500 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                <input type="text" placeholder="Konu Başlığı" class="topic-title w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white">
                <input type="text" placeholder="YouTube Link" class="topic-url w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white">
            `;
            container.appendChild(div);
            lucide.createIcons();
        };

        window.saveCourse = async () => {
            if (!currentUser) return;
            const name = document.getElementById('course-name').value;
            const titles = document.querySelectorAll('.topic-title');
            const urls = document.querySelectorAll('.topic-url');
            const topics = Array.from(titles).map((input, i) => ({ 
                title: input.value, 
                url: urls[i].value, 
                completed: false, 
                id: crypto.randomUUID() 
            })).filter(t => t.title && t.url);

            if (!name || topics.length === 0) return showNotify("Eksik veri.");

            const { error } = await supabaseClient.from('courses').insert([{ user_id: currentUser.id, name, topics }]);
            if (error) showNotify(error.message);
            else { showNotify("Ders eklendi!", "success"); closeModal('add-course-modal'); fetchCourses(); }
        };

        async function fetchCourses() {
            const { data } = await supabaseClient.from('courses').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            courses = data || [];
            const list = document.getElementById('course-list');
            list.innerHTML = courses.length ? "" : `<div class="col-span-full py-32 text-center text-gray-600 border-2 border-dashed border-white/5 rounded-3xl">Ders eklenmemiş.</div>`;
            courses.forEach(c => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl p-8 border border-white/5 hover:border-indigo-500/40 transition-all flex flex-col justify-between group shadow-xl";
                div.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <h4 class="font-extrabold text-2xl text-white truncate w-full pr-4">${c.name}</h4>
                            <button onclick="window.deleteCourse('${c.id}')" class="text-gray-600 hover:text-red-400 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                        <p class="text-sm text-gray-400 mb-8">${c.topics.length} Konu Mevcut</p>
                    </div>
                    <button onclick="window.startStudy('${c.id}')" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition flex items-center justify-center gap-2">
                        <i data-lucide="play" class="w-4 h-4 fill-current"></i> Çalışmaya Başla
                    </button>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        window.deleteCourse = async (id) => { if(confirm("Silinsin mi?")) { await supabaseClient.from('courses').delete().eq('id', id); fetchCourses(); } };

        // STUDY MODE
        window.startStudy = (id) => {
            activeCourse = courses.find(c => c.id === id);
            document.getElementById('study-course-title').textContent = activeCourse.name;
            document.getElementById('ai-summary-text').textContent = activeCourse.ai_summary || "Henüz not oluşturulmadı.";
            renderSidebar();
            loadVideo(activeCourse.topics[0].id);
            document.getElementById('study-mode').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        };

        function renderSidebar() {
            const list = document.getElementById('topic-list-sidebar');
            list.innerHTML = "";
            activeCourse.topics.forEach((topic) => {
                const div = document.createElement('div');
                div.className = `topic-item p-3 rounded-xl border border-white/5 flex items-center justify-between cursor-pointer transition-all hover:bg-white/5 ${topic.id === activeVideoId ? 'active' : ''} ${topic.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 overflow-hidden" onclick="window.loadVideo('${topic.id}')">
                        <div class="w-6 h-6 rounded-full border border-indigo-500/50 flex items-center justify-center text-[10px] text-indigo-400 flex-shrink-0">
                            ${topic.completed ? '✓' : ''}
                        </div>
                        <span class="text-sm font-medium truncate">${topic.title}</span>
                    </div>
                    <button onclick="window.toggleComplete('${topic.id}')" class="p-1.5 hover:bg-indigo-500/20 rounded-md text-indigo-400">
                        <i data-lucide="${topic.completed ? 'check-circle' : 'circle'}" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        let activeVideoId = null;
        window.loadVideo = (topicId) => {
            activeVideoId = topicId;
            const topic = activeCourse.topics.find(t => t.id === topicId);
            const videoId = topic.url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/)?.[2];
            document.getElementById('video-container').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1" frameborder="0" allowfullscreen></iframe>`;
            renderSidebar();
        };

        window.toggleComplete = async (topicId) => {
            activeCourse.topics = activeCourse.topics.map(t => t.id === topicId ? {...t, completed: !t.completed} : t);
            await supabaseClient.from('courses').update({ topics: activeCourse.topics }).eq('id', activeCourse.id);
            renderSidebar();
        };

        // --- AI UPDATE ---
        window.requestAIUpdate = async () => {
            const btn = document.getElementById('generate-ai-btn');
            const btnText = document.getElementById('ai-btn-text');
            btn.disabled = true;
            btnText.textContent = "AI Analiz Yapıyor...";

            try {
                // Key çek
                const { data: keyData } = await supabaseClient.from('settings').select('key_value').eq('key_name', 'gemini_api_key').single();
                const genKey = keyData?.key_value;
                if(!genKey) throw new Error("API Anahtarı bulunamadı.");

                const topicNames = activeCourse.topics.map(t => t.title).join(", ");
                const prompt = `Ders: ${activeCourse.name}. Konular: ${topicNames}. Bu ders ve konular için profesyonel, madde madde ve detaylı bir Türkçe çalışma özeti hazırlayın.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${genKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const result = await response.json();
                const summary = result.candidates?.[0]?.content?.parts?.[0]?.text || "Özet hazırlanamadı.";

                // Supabase Update
                await supabaseClient.from('courses').update({ ai_summary: summary }).eq('id', activeCourse.id);
                
                activeCourse.ai_summary = summary;
                document.getElementById('ai-summary-text').textContent = summary;
                showNotify("AI Notları Güncellendi!", "success");
            } catch (err) {
                showNotify("AI Hatası: " + err.message);
            } finally {
                btn.disabled = false;
                btnText.textContent = "✨ AI Notlarını Oluştur";
            }
        };

        window.exitStudyMode = () => {
            document.getElementById('study-mode').classList.add('hidden');
            document.getElementById('video-container').innerHTML = "";
            document.body.style.overflow = 'auto';
            fetchCourses();
        };

        window.showModal = (id) => {
            document.getElementById(id).classList.remove('hidden');
            if(id === 'add-course-modal' && document.getElementById('topics-container').innerHTML === "") window.addTopicField();
        };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    </script>
</body>
</html>
