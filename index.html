<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow AI - Supabase & Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .loader { border-top-color: #818cf8; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #auth-screen, #dashboard-screen { display: none; }
        #auth-screen.flex { display: flex; }
        #dashboard-screen.flex { display: flex; }
        
        #loading-screen { 
            position: fixed; inset: 0; background: #0f172a; 
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="loading-screen">
        <div class="loader w-12 h-12 border-4 rounded-full"></div>
    </div>

    <!-- Auth Ekranı -->
    <div id="auth-screen" class="items-center justify-center min-h-screen">
        <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold gradient-text italic">StudyFlow AI</h1>
                <p class="text-gray-400 mt-2">Akıllı Ders Çalışma Platformu</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="E-Posta" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:border-indigo-500 outline-none">
                <input type="password" id="auth-password" placeholder="Şifre" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:border-indigo-500 outline-none">
                <div class="flex flex-col gap-3 pt-2">
                    <button id="login-btn" onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition">Giriş Yap</button>
                    <button id="signup-btn" onclick="handleSignup()" class="w-full bg-white/5 hover:bg-white/10 text-indigo-400 py-3 rounded-xl border border-white/10 transition">Yeni Hesap Oluştur</button>
                </div>
            </div>
            <div id="auth-error" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/40 text-red-200 text-xs rounded-lg text-center leading-relaxed"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-screen" class="min-h-screen flex-col">
        <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg"><i data-lucide="graduation-cap" class="text-white w-6 h-6"></i></div>
                <span class="text-xl font-bold gradient-text">StudyFlow AI</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showModal('add-course-modal')" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition flex items-center gap-2 text-sm font-bold shadow-lg shadow-indigo-600/20">
                    <i data-lucide="plus" class="w-4 h-4"></i> Yeni Ders Planla
                </button>
                <button onclick="handleLogout()" class="p-2 text-gray-400 hover:text-white"><i data-lucide="log-out"></i></button>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-8 flex-1">
            <header class="mb-10">
                <h2 class="text-3xl font-bold flex items-center gap-3"><i data-lucide="layout-dashboard" class="text-indigo-400"></i> Akademik Programım</h2>
            </header>
            <div id="course-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="col-span-full py-32 text-center text-gray-600" id="no-courses italic">Ders bulunamadı.</div>
            </div>
        </main>
    </div>

    <!-- Çalışma Modülü -->
    <div id="study-mode" class="hidden fixed inset-0 z-[60] bg-slate-950 flex flex-col lg:flex-row overflow-hidden">
        <div class="flex-1 relative bg-black flex flex-col items-center justify-center p-4">
            <button onclick="exitStudyMode()" class="absolute top-4 left-4 z-10 bg-white/10 backdrop-blur-md text-white px-4 py-2 rounded-full hover:bg-white/20 transition-all">
                <i data-lucide="arrow-left" class="w-4 h-4 inline mr-1"></i> Programıma Dön
            </button>
            <div id="video-container" class="w-full aspect-video max-w-5xl shadow-2xl rounded-2xl overflow-hidden border border-white/10 bg-slate-900 group relative"></div>
            <div class="mt-6 w-full max-w-5xl">
                <div id="topic-nav" class="flex gap-3 overflow-x-auto pb-4 custom-scrollbar"></div>
            </div>
        </div>
        <div class="w-full lg:w-[450px] glass h-full flex flex-col border-l border-white/10 shadow-2xl">
            <div class="p-6 border-b border-white/10 bg-white/5">
                <h3 id="study-course-title" class="text-2xl font-bold text-indigo-400 truncate">Ders İsmi</h3>
                <p id="study-topic-title" class="text-sm font-medium italic text-indigo-300 mt-1"></p>
            </div>
            <div class="flex-1 overflow-y-auto p-6 custom-scrollbar bg-slate-900/30">
                <div class="flex items-center gap-2 text-purple-400 font-bold mb-4 uppercase tracking-wider text-xs">
                    <i data-lucide="sparkles" class="w-5 h-5"></i> AI Ders Özeti & Notlar
                </div>
                <div id="ai-summary-text" class="text-gray-300 leading-relaxed text-sm whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="add-course-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="glass p-8 rounded-3xl w-full max-w-3xl shadow-2xl relative max-h-[90vh] flex flex-col border border-white/10">
            <button onclick="closeModal('add-course-modal')" class="absolute top-6 right-6 text-gray-400 hover:text-white transition"><i data-lucide="x"></i></button>
            <h3 class="text-2xl font-bold mb-6">Yeni Müfredat Planla</h3>
            <div class="space-y-6 overflow-y-auto pr-4 custom-scrollbar flex-1">
                <input type="text" id="course-name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-lg text-white focus:border-indigo-500 outline-none" placeholder="Ders Adı (Örn: TYT Biyoloji)">
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Konu Listesi</label>
                        <button onclick="window.addTopicField()" class="text-xs bg-indigo-600/20 text-indigo-400 px-4 py-2 rounded-xl border border-indigo-500/30 hover:bg-indigo-600 hover:text-white transition-all font-bold">+ Konu Ekle</button>
                    </div>
                    <div id="topics-container" class="space-y-4"></div>
                </div>
            </div>
            <div class="pt-8 mt-4 border-t border-white/5">
                <button id="save-course-btn" onclick="window.saveCourse()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl transition flex items-center justify-center gap-3 disabled:opacity-50">
                    <span id="btn-text">Müfredatı Kaydet ve AI Notlarını Oluştur</span>
                    <div id="btn-loader" class="hidden loader w-5 h-5 border-2 rounded-full"></div>
                </button>
            </div>
        </div>
    </div>

    <div id="notification-area" class="fixed top-4 right-4 z-[1000] space-y-2 pointer-events-none"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = "https://ihkermhphlquvwklwtun.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_HsvhilHIDDBQezTDiKvkmg_G5y7vELZ"; 
        
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let courses = [];
        let topicIndex = 0;
        let isSessionChecked = false;

        function showNotify(msg, type = "error") {
            const area = document.getElementById('notification-area');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl border pointer-events-auto transition-all duration-300 transform translate-x-full ${
                type === 'success' ? 'bg-green-900/80 border-green-500 text-green-100' : 'bg-red-900/80 border-red-500 text-red-100'
            }`;
            toast.textContent = msg;
            area.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 5000);
        }

        function updateUIScreens(user) {
            document.getElementById('loading-screen').style.display = 'none';
            const authScreen = document.getElementById('auth-screen');
            const dashboardScreen = document.getElementById('dashboard-screen');
            
            if (user) {
                authScreen.classList.remove('flex'); authScreen.style.display = 'none';
                dashboardScreen.classList.add('flex'); dashboardScreen.style.display = 'flex';
                if (!isSessionChecked) { fetchCourses(); isSessionChecked = true; }
            } else {
                dashboardScreen.classList.remove('flex'); dashboardScreen.style.display = 'none';
                authScreen.classList.add('flex'); authScreen.style.display = 'flex';
                isSessionChecked = false;
            }
            lucide.createIcons();
        }

        window.handleLogin = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('login-btn');
            if(!email || !password) return showNotify("Lütfen tüm alanları doldurun.");
            btn.disabled = true; btn.textContent = "Giriş yapılıyor...";
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) { showNotify(error.message); btn.disabled = false; btn.textContent = "Giriş Yap"; }
        };

        window.handleSignup = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('signup-btn');
            if(!email || !password) return showNotify("E-posta ve şifre gereklidir.");
            btn.disabled = true; btn.textContent = "Kaydolunuyor...";
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) { showNotify(error.message); btn.disabled = false; btn.textContent = "Yeni Hesap Oluştur"; }
            else if (data.session) { showNotify("Kayıt başarılı!", "success"); }
            else { showNotify("Hesap oluşturuldu! Giriş yapabilirsiniz.", "success"); btn.disabled = false; }
        };

        window.handleLogout = async () => { await supabaseClient.auth.signOut(); window.location.reload(); };

        supabaseClient.auth.onAuthStateChange((event, session) => {
            currentUser = session?.user;
            updateUIScreens(currentUser);
        });

        const initApp = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user;
            updateUIScreens(currentUser);
        };
        initApp();

        window.addTopicField = () => {
            const container = document.getElementById('topics-container');
            const currentIdx = topicIndex++;
            const div = document.createElement('div');
            div.className = "p-5 bg-white/5 rounded-2xl border border-white/5 space-y-4 relative group transition-all hover:bg-white/10";
            div.id = `topic-row-${currentIdx}`;
            div.innerHTML = `
                <button onclick="document.getElementById('topic-row-${currentIdx}').remove()" class="absolute top-4 right-4 text-gray-500 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                <input type="text" placeholder="Konu Başlığı" class="topic-title w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:border-indigo-500 outline-none">
                <input type="text" placeholder="YouTube Video Linki" class="topic-url w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:border-indigo-500 outline-none">
            `;
            container.appendChild(div);
            lucide.createIcons();
        };

        // --- GÜVENLİ AI ÖZETLEME MANTIĞI ---
        async function fetchGeminiKey() {
            const { data, error } = await supabaseClient
                .from('settings')
                .select('key_value')
                .eq('key_name', 'gemini_api_key')
                .single();
            if (error) { console.error("Key fetch error:", error); return null; }
            return data.key_value;
        }

        async function generateAIContent(courseName, topics) {
            const api_key = await fetchGeminiKey();
            if (!api_key) return "API Anahtarı veritabanından alınamadı. Lütfen SQL adımını uygulayın.";

            const topicTitles = topics.map(t => t.title).join(", ");
            const userPrompt = `Ders: ${courseName}. Konular: ${topicTitles}. Bu konular için kapsamlı, profesyonel ve madde madde bir Türkçe çalışma özeti hazırla.`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${api_key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userPrompt }] }] })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "AI yanıtı boş geldi.";
            } catch (err) {
                console.error("Gemini Error:", err);
                return "Yapay zeka bağlantısında bir sorun oluştu.";
            }
        }

        window.saveCourse = async () => {
            if (!currentUser) return showNotify("Giriş yapın.");
            const courseName = document.getElementById('course-name').value;
            const titleInputs = document.querySelectorAll('.topic-title');
            const urlInputs = document.querySelectorAll('.topic-url');
            
            const topics = [];
            titleInputs.forEach((input, i) => {
                if(input.value && urlInputs[i].value) topics.push({ title: input.value, url: urlInputs[i].value });
            });

            if (!courseName || topics.length === 0) return showNotify("Eksik bilgi.");

            const btn = document.getElementById('save-course-btn');
            btn.disabled = true;
            document.getElementById('btn-loader').classList.remove('hidden');
            document.getElementById('btn-text').textContent = "AI Notları Hazırlıyor...";

            try {
                const summary = await generateAIContent(courseName, topics);
                const { error } = await supabaseClient
                    .from('courses')
                    .insert([{ user_id: currentUser.id, name: courseName, topics, ai_summary: summary }]);

                if (error) { showNotify("Kayıt Hatası: " + error.message); } 
                else {
                    showNotify("Ders planlandı!", "success");
                    window.closeModal('add-course-modal');
                    document.getElementById('course-name').value = ""; 
                    document.getElementById('topics-container').innerHTML = ""; 
                    fetchCourses();
                }
            } catch (err) { showNotify("Hata oluştu."); } 
            finally { btn.disabled = false; document.getElementById('btn-loader').classList.add('hidden'); document.getElementById('btn-text').textContent = "Kaydet"; }
        };

        async function fetchCourses() {
            if (!currentUser) return;
            const { data, error } = await supabaseClient.from('courses').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            if (!error) { courses = data; renderCourses(); }
        }

        function renderCourses() {
            const list = document.getElementById('course-list');
            list.innerHTML = "";
            if (courses.length === 0) { list.innerHTML = `<div class="col-span-full py-32 text-center text-gray-600">Henüz ders eklenmemiş.</div>`; return; }

            courses.forEach(course => {
                const card = document.createElement('div');
                card.className = "glass rounded-3xl p-8 border border-white/5 hover:border-indigo-500/40 transition-all flex flex-col justify-between group shadow-xl";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <h4 class="font-extrabold text-2xl text-white truncate w-full pr-4">${course.name}</h4>
                            <button onclick="window.deleteCourse('${course.id}')" class="text-gray-600 hover:text-red-400 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                        <div class="space-y-2 mb-8 text-sm text-gray-400">
                            ${course.topics.slice(0, 3).map(t => `<p class="truncate">• ${t.title}</p>`).join('')}
                        </div>
                    </div>
                    <button onclick="window.startStudy('${course.id}')" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition flex items-center justify-center gap-2">
                        <i data-lucide="play" class="w-4 h-4 fill-current"></i> Çalışmaya Başla
                    </button>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        window.deleteCourse = async (id) => {
            if(confirm("Silinsin mi?")) {
                await supabaseClient.from('courses').delete().eq('id', id);
                fetchCourses();
            }
        };

        window.startStudy = (id) => {
            const course = courses.find(c => c.id === id);
            if (!course) return;
            document.getElementById('study-course-title').textContent = course.name;
            document.getElementById('ai-summary-text').textContent = course.ai_summary || "Özet hazır değil.";
            const nav = document.getElementById('topic-nav');
            nav.innerHTML = "";
            course.topics.forEach((topic, i) => {
                const btn = document.createElement('button');
                btn.className = "px-6 py-3 bg-white/5 border border-white/10 rounded-2xl text-sm whitespace-nowrap hover:bg-indigo-600 transition-all font-semibold";
                btn.textContent = `${i+1}. ${topic.title}`;
                btn.onclick = () => window.loadVideo(topic);
                nav.appendChild(btn);
            });
            window.loadVideo(course.topics[0]);
            document.getElementById('study-mode').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        };

        window.loadVideo = (topic) => {
            const videoIdMatch = topic.url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            const videoId = videoIdMatch ? videoIdMatch[2] : null;
            document.getElementById('study-topic-title').textContent = topic.title;
            document.getElementById('video-container').innerHTML = `
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allowfullscreen></iframe>
            `;
        };

        window.exitStudyMode = () => {
            document.getElementById('study-mode').classList.add('hidden');
            document.getElementById('video-container').innerHTML = "";
            document.body.style.overflow = 'auto';
        };

        window.showModal = (id) => {
            document.getElementById(id).classList.remove('hidden');
            if(id === 'add-course-modal' && document.getElementById('topics-container').innerHTML === "") window.addTopicField();
        };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    </script>
</body>
</html>
