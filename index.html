<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow AI - Kesintisiz Çalışma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .loader { border-top-color: #818cf8; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #auth-screen, #dashboard-screen { display: none; }
        #auth-screen.flex { display: flex; }
        #dashboard-screen.flex { display: flex; }
        
        #loading-screen { 
            position: fixed; inset: 0; background: #0f172a; 
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        .topic-item.active { background: rgba(99, 102, 241, 0.2); border-left: 4px solid #6366f1; }
        .topic-item.completed { opacity: 0.65; }
        .tab-btn.active { border-bottom: 3px solid #6366f1; color: #818cf8; background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- Flicker Engelleme ve Yükleme -->
    <div id="loading-screen">
        <div class="loader w-12 h-12 border-4 rounded-full"></div>
    </div>

    <!-- Giriş/Kayıt Ekranı -->
    <div id="auth-screen" class="items-center justify-center min-h-screen">
        <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold gradient-text italic">StudyFlow AI</h1>
                <p class="text-gray-400 mt-2">Ders Çalışmanın Yeni Nesil Yolu</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="E-Posta" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:border-indigo-500 outline-none transition-all">
                <input type="password" id="auth-password" placeholder="Şifre" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white focus:border-indigo-500 outline-none transition-all">
                <div class="flex flex-col gap-3 pt-2">
                    <button id="login-btn" onclick="window.handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition transform active:scale-95">Giriş Yap</button>
                    <button id="signup-btn" onclick="window.handleSignup()" class="w-full bg-white/5 hover:bg-white/10 text-indigo-400 py-3 rounded-xl border border-white/10 transition transform active:scale-95">Ücretsiz Kaydol</button>
                </div>
            </div>
            <div id="auth-error" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/40 text-red-200 text-xs rounded-lg text-center leading-relaxed"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-screen" class="min-h-screen flex-col">
        <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg shadow-lg shadow-indigo-500/30"><i data-lucide="graduation-cap" class="text-white w-6 h-6"></i></div>
                <span class="text-xl font-bold gradient-text">StudyFlow AI</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="window.showModal('add-course-modal')" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition flex items-center gap-2 text-sm font-bold shadow-lg">
                    <i data-lucide="plus" class="w-4 h-4"></i> Ders Ekle
                </button>
                <button onclick="window.handleLogout()" class="p-2 text-gray-400 hover:text-white transition"><i data-lucide="log-out"></i></button>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-8 flex-1">
            <header class="mb-10">
                <h2 class="text-3xl font-bold flex items-center gap-3"><i data-lucide="layout-dashboard" class="text-indigo-400"></i> Eğitimlerim</h2>
            </header>
            <div id="course-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- JavaScript ile Doldurulacak -->
            </div>
        </main>
    </div>

    <!-- Çalışma Modülü -->
    <div id="study-mode" class="hidden fixed inset-0 z-[60] bg-slate-950 flex flex-col md:flex-row overflow-hidden">
        <!-- Sol Panel: Player -->
        <div class="flex-1 relative flex flex-col bg-black">
            <div class="p-4 flex items-center justify-between border-b border-white/5 bg-slate-900/50">
                <button onclick="window.exitStudyMode()" class="bg-white/10 text-white px-4 py-2 rounded-lg hover:bg-white/20 transition-all flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Çıkış
                </button>
                <div class="text-center overflow-hidden px-4">
                    <h3 id="study-course-title" class="font-bold text-lg text-white truncate">Ders Başlığı</h3>
                    <p id="current-module-indicator" class="text-xs text-indigo-400 font-medium truncate"></p>
                </div>
                <div id="progress-text" class="text-[10px] text-gray-400 font-bold bg-white/5 px-3 py-1 rounded-full whitespace-nowrap">İlerleme: 0/0</div>
            </div>
            
            <div class="flex-1 flex items-center justify-center p-2 md:p-6">
                <div id="video-container" class="w-full aspect-video max-w-5xl shadow-2xl rounded-2xl overflow-hidden border border-white/10 bg-slate-900"></div>
            </div>

            <!-- Navigasyon Kontrolleri -->
            <div class="p-4 md:p-6 bg-slate-900/80 border-t border-white/5 flex items-center justify-between">
                <button onclick="window.prevTopic()" id="prev-btn" class="flex items-center gap-2 text-gray-400 hover:text-white transition disabled:opacity-20 font-medium">
                    <i data-lucide="chevron-left"></i> Önceki
                </button>
                
                <button onclick="window.toggleCompleteActive()" id="complete-active-btn" class="bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 px-6 py-2 rounded-xl hover:bg-indigo-600 hover:text-white transition font-bold text-sm">
                    Konuyu Tamamla
                </button>

                <button onclick="window.nextTopic()" id="next-btn" class="flex items-center gap-2 text-gray-400 hover:text-white transition disabled:opacity-20 font-medium">
                    Sonraki <i data-lucide="chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Sağ Panel: Tabs -->
        <div class="w-full md:w-[380px] lg:w-[440px] glass h-full flex flex-col border-l border-white/10">
            <div class="flex border-b border-white/10 bg-slate-900/50">
                <button onclick="window.switchTab('mufredat')" id="tab-mufredat" class="tab-btn flex-1 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400 active">Ders Planı</button>
                <button onclick="window.switchTab('notlar')" id="tab-notlar" class="tab-btn flex-1 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Not Al</button>
                <button onclick="window.switchTab('ai')" id="tab-ai" class="tab-btn flex-1 py-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">AI Özet</button>
            </div>

            <!-- Müfredat -->
            <div id="content-mufredat" class="tab-content flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2"></div>

            <!-- Kişisel Notlar -->
            <div id="content-notlar" class="tab-content hidden flex-1 flex flex-col p-6 space-y-4">
                <div class="flex items-center justify-between">
                    <label class="text-xs font-bold text-gray-500 uppercase">Ders Notlarım</label>
                    <button onclick="window.clearNotes()" class="text-[10px] text-red-400 hover:underline">Temizle</button>
                </div>
                <textarea id="personal-notes-area" class="flex-1 bg-slate-800/40 border border-white/5 rounded-2xl p-4 text-sm text-gray-300 focus:border-indigo-500 outline-none custom-scrollbar resize-none" placeholder="İzlediğin kısımları buraya not alabilirsin..."></textarea>
                <button onclick="window.saveNotes()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition flex items-center justify-center gap-2 shadow-lg">
                    <i data-lucide="save" class="w-4 h-4"></i> Notları Kaydet
                </button>
            </div>

            <!-- AI Özet -->
            <div id="content-ai" class="tab-content hidden flex-1 flex flex-col overflow-hidden">
                <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
                    <div id="ai-summary-text" class="text-gray-300 leading-relaxed text-sm prose prose-invert whitespace-pre-wrap italic">
                        Notlar henüz oluşturulmadı.
                    </div>
                </div>
                <div class="p-6 bg-slate-900/50 border-t border-white/5">
                    <button id="generate-ai-btn" onclick="window.requestAIUpdate()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl transition flex items-center justify-center gap-3">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                        <span id="ai-btn-text">Yapay Zeka Notu Çıkart</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Ders Ekle Modal -->
    <div id="add-course-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="glass p-8 rounded-3xl w-full max-w-3xl shadow-2xl relative max-h-[90vh] flex flex-col border border-white/10">
            <button onclick="window.closeModal('add-course-modal')" class="absolute top-6 right-6 text-gray-400 hover:text-white transition"><i data-lucide="x"></i></button>
            <h3 class="text-2xl font-bold mb-6">Müfredat Oluştur</h3>
            <div class="space-y-6 overflow-y-auto pr-4 custom-scrollbar flex-1">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase">1. Ders Adı</label>
                    <input type="text" id="course-name" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-lg text-white focus:border-indigo-500 outline-none" placeholder="Örn: TYT Kimya Kampı">
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-gray-500 uppercase">2. Konular ve Linkler</label>
                        <button onclick="window.addTopicField()" class="text-xs text-indigo-400 font-bold hover:underline">+ Konu Ekle</button>
                    </div>
                    <div id="topics-container" class="space-y-4"></div>
                </div>
            </div>
            <div class="pt-8 mt-4 border-t border-white/5">
                <button id="save-course-btn" onclick="window.saveCourse()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl transition shadow-xl">
                    Sisteme Kaydet
                </button>
            </div>
        </div>
    </div>

    <div id="notification-area" class="fixed top-4 right-4 z-[1000] space-y-2 pointer-events-none"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // --- KONFİGÜRASYON ---
        const SUPABASE_URL = "https://ihkermhphlquvwklwtun.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_HsvhilHIDDBQezTDiKvkmg_G5y7vELZ"; 
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let courses = [];
        let activeCourse = null;
        let activeVideoId = null;
        let topicIndex = 0;

        // UI NOTIFICATION
        window.showNotify = (msg, type = "error") => {
            const area = document.getElementById('notification-area');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl border pointer-events-auto transition-all duration-300 transform translate-x-full ${type === 'success' ? 'bg-green-900/90 border-green-500' : 'bg-red-900/90 border-red-500'}`;
            toast.textContent = msg;
            area.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 4000);
        };

        // --- EKRAN YÖNETİMİ ---
        const updateUIScreens = (user) => {
            document.getElementById('loading-screen').style.display = 'none';
            const authScreen = document.getElementById('auth-screen');
            const dashboardScreen = document.getElementById('dashboard-screen');
            
            if (user) {
                authScreen.classList.remove('flex'); authScreen.style.display = 'none';
                dashboardScreen.classList.add('flex'); dashboardScreen.style.display = 'flex';
                fetchCourses();
            } else {
                dashboardScreen.classList.remove('flex'); dashboardScreen.style.display = 'none';
                authScreen.classList.add('flex'); authScreen.style.display = 'flex';
            }
            lucide.createIcons();
        };

        // --- AUTH ---
        window.handleLogin = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) window.showNotify(error.message);
        };

        window.handleSignup = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) window.showNotify(error.message);
            else window.showNotify("Kaydınız yapıldı, giriş yapabilirsiniz.", "success");
        };

        window.handleLogout = async () => { await supabaseClient.auth.signOut(); location.reload(); };

        supabaseClient.auth.onAuthStateChange((_, session) => {
            currentUser = session?.user;
            updateUIScreens(currentUser);
        });

        // INIT
        const init = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user;
            updateUIScreens(currentUser);
        };
        init();

        // --- DATA MANTIĞI ---
        window.addTopicField = () => {
            const container = document.getElementById('topics-container');
            const currentIdx = topicIndex++;
            const div = document.createElement('div');
            div.className = "p-4 bg-white/5 rounded-xl border border-white/5 space-y-2 relative group";
            div.id = `topic-row-${currentIdx}`;
            div.innerHTML = `
                <button onclick="document.getElementById('topic-row-${currentIdx}').remove()" class="absolute top-2 right-2 text-gray-500 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                <input type="text" placeholder="Konu Başlığı" class="topic-title w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white focus:border-indigo-500 outline-none">
                <input type="text" placeholder="YouTube Link (https://...)" class="topic-url w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white focus:border-indigo-500 outline-none">
            `;
            container.appendChild(div);
            lucide.createIcons();
        };

        window.saveCourse = async () => {
            if (!currentUser) return;
            const name = document.getElementById('course-name').value;
            const titles = document.querySelectorAll('.topic-title');
            const urls = document.querySelectorAll('.topic-url');
            const topics = Array.from(titles).map((input, i) => ({ 
                title: input.value, 
                url: urls[i].value, 
                completed: false, 
                id: crypto.randomUUID() 
            })).filter(t => t.title && t.url);

            if (!name || topics.length === 0) return window.showNotify("Lütfen tüm alanları doldurun.");

            const { error } = await supabaseClient.from('courses').insert([{ 
                user_id: currentUser.id, name, topics, personal_notes: ""
            }]);

            if (error) window.showNotify(error.message);
            else { window.showNotify("Ders eklendi!", "success"); window.closeModal('add-course-modal'); fetchCourses(); }
        };

        async function fetchCourses() {
            if (!currentUser) return;
            const { data } = await supabaseClient.from('courses').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            courses = data || [];
            const list = document.getElementById('course-list');
            list.innerHTML = courses.length ? "" : `<div class="col-span-full py-32 text-center text-gray-600 border-2 border-dashed border-white/5 rounded-3xl">Henüz ders eklemediniz. "Ders Ekle" butonuyla başlayın.</div>`;
            courses.forEach(c => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl p-8 border border-white/5 hover:border-indigo-500/40 transition-all flex flex-col justify-between group shadow-xl";
                div.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <h4 class="font-extrabold text-2xl text-white truncate w-full pr-4">${c.name}</h4>
                            <button onclick="window.deleteCourse('${c.id}')" class="text-gray-600 hover:text-red-400 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                        <p class="text-sm text-gray-500 mb-8">${c.topics.length} Konu / Modül</p>
                    </div>
                    <button onclick="window.startStudy('${c.id}')" class="start-btn w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition flex items-center justify-center gap-2 active:scale-95">
                        <i data-lucide="play" class="w-4 h-4 fill-current"></i> Çalışmaya Başla
                    </button>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        window.deleteCourse = async (id) => { if(confirm("Ders silinsin mi?")) { await supabaseClient.from('courses').delete().eq('id', id); fetchCourses(); } };

        // --- ÇALIŞMA MODÜLÜ MOTORU ---
        window.startStudy = (id) => {
            activeCourse = courses.find(c => c.id === id);
            if (!activeCourse || !activeCourse.topics.length) return;
            
            activeVideoId = activeCourse.topics[0].id;
            
            document.getElementById('study-course-title').textContent = activeCourse.name;
            document.getElementById('ai-summary-text').textContent = activeCourse.ai_summary || "Notlar henüz oluşturulmadı. Sağ taraftaki AI sekmesine geçerek oluşturabilirsiniz.";
            document.getElementById('personal-notes-area').value = activeCourse.personal_notes || "";
            
            renderSidebar();
            window.loadVideo(activeVideoId);
            window.switchTab('mufredat');
            
            document.getElementById('study-mode').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        };

        window.loadVideo = (topicId) => {
            activeVideoId = topicId;
            const topic = activeCourse.topics.find(t => t.id === topicId);
            const videoIdMatch = topic.url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            const videoId = videoIdMatch ? videoIdMatch[2] : "";
            
            document.getElementById('video-container').innerHTML = `
                <iframe width="100%" height="100%" 
                src="https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0" 
                frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            `;
            document.getElementById('current-module-indicator').textContent = `Modül: ${topic.title}`;
            
            updateNavigationButtons();
            renderSidebar();
            updateProgress();
        };

        function renderSidebar() {
            const list = document.getElementById('content-mufredat');
            list.innerHTML = "";
            activeCourse.topics.forEach((topic, idx) => {
                const div = document.createElement('div');
                div.className = `topic-item p-4 rounded-2xl border border-white/5 flex items-center justify-between cursor-pointer transition-all hover:bg-white/5 ${topic.id === activeVideoId ? 'active' : ''} ${topic.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 overflow-hidden" onclick="window.loadVideo('${topic.id}')">
                        <div class="w-7 h-7 rounded-full border ${topic.completed ? 'bg-indigo-600 border-indigo-600' : 'border-indigo-500/50'} flex items-center justify-center text-[10px] text-white flex-shrink-0 font-bold">
                            ${topic.completed ? '✓' : idx + 1}
                        </div>
                        <span class="text-xs font-bold truncate ${topic.id === activeVideoId ? 'text-indigo-400' : 'text-gray-300'}">${topic.title}</span>
                    </div>
                    <button onclick="window.toggleComplete('${topic.id}')" class="p-1 hover:bg-indigo-500/20 rounded text-indigo-400">
                        <i data-lucide="${topic.completed ? 'check-circle' : 'circle'}" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function updateNavigationButtons() {
            const idx = activeCourse.topics.findIndex(t => t.id === activeVideoId);
            document.getElementById('prev-btn').disabled = (idx === 0);
            document.getElementById('next-btn').disabled = (idx === activeCourse.topics.length - 1);
            
            const activeTopic = activeCourse.topics[idx];
            document.getElementById('complete-active-btn').innerHTML = activeTopic.completed ? `<i data-lucide="check" class="w-4 h-4"></i> Tamamlandı` : "Konuyu Tamamla";
            lucide.createIcons();
        }

        function updateProgress() {
            const total = activeCourse.topics.length;
            const completed = activeCourse.topics.filter(t => t.completed).length;
            document.getElementById('progress-text').textContent = `İlerleme: ${completed}/${total}`;
        }

        window.nextTopic = () => {
            const idx = activeCourse.topics.findIndex(t => t.id === activeVideoId);
            if (idx < activeCourse.topics.length - 1) window.loadVideo(activeCourse.topics[idx + 1].id);
        };

        window.prevTopic = () => {
            const idx = activeCourse.topics.findIndex(t => t.id === activeVideoId);
            if (idx > 0) window.loadVideo(activeCourse.topics[idx - 1].id);
        };

        window.toggleComplete = async (topicId) => {
            activeCourse.topics = activeCourse.topics.map(t => t.id === topicId ? {...t, completed: !t.completed} : t);
            await supabaseClient.from('courses').update({ topics: activeCourse.topics }).eq('id', activeCourse.id);
            renderSidebar();
            updateProgress();
            updateNavigationButtons();
        };

        window.toggleCompleteActive = () => window.toggleComplete(activeVideoId);

        // TAB SİSTEMİ
        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`content-${tabName}`).classList.remove('hidden');
        };

        // NOT SİSTEMİ
        window.saveNotes = async () => {
            const notes = document.getElementById('personal-notes-area').value;
            const { error } = await supabaseClient.from('courses').update({ personal_notes: notes }).eq('id', activeCourse.id);
            if (error) window.showNotify("Notlar kaydedilemedi.");
            else { activeCourse.personal_notes = notes; window.showNotify("Notların kaydedildi!", "success"); }
        };

        window.clearNotes = () => {
            if(confirm("Tüm notları temizlemek istiyor musun?")) {
                document.getElementById('personal-notes-area').value = "";
                window.saveNotes();
            }
        };

        // AI SİSTEMİ
        window.requestAIUpdate = async () => {
            const btn = document.getElementById('generate-ai-btn');
            const btnText = document.getElementById('ai-btn-text');
            btn.disabled = true; btnText.textContent = "Analiz Ediliyor...";

            try {
                const { data: keyData } = await supabaseClient.from('settings').select('key_value').eq('key_name', 'gemini_api_key').single();
                const genKey = keyData?.key_value;
                if(!genKey) throw new Error("API Anahtarı bulunamadı.");

                const topicNames = activeCourse.topics.map(t => t.title).join(", ");
                const prompt = `Ders: ${activeCourse.name}. Konular: ${topicNames}. Bu ders ve konular için çok detaylı, madde madde, formülleri içeren profesyonel bir Türkçe çalışma özeti hazırla.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${genKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const result = await response.json();
                const summary = result.candidates?.[0]?.content?.parts?.[0]?.text || "Özet hazırlanamadı.";

                await supabaseClient.from('courses').update({ ai_summary: summary }).eq('id', activeCourse.id);
                activeCourse.ai_summary = summary;
                document.getElementById('ai-summary-text').textContent = summary;
                window.showNotify("AI Notları güncellendi!", "success");
            } catch (err) { window.showNotify("AI Hatası: " + err.message); } 
            finally { btn.disabled = false; btnText.textContent = "AI Notlarını Güncelle"; }
        };

        // YARDIMCILAR
        window.exitStudyMode = () => {
            document.getElementById('study-mode').classList.add('hidden');
            document.getElementById('video-container').innerHTML = "";
            document.body.style.overflow = 'auto';
            fetchCourses();
        };
        window.showModal = (id) => {
            document.getElementById(id).classList.remove('hidden');
            if(id === 'add-course-modal') {
                document.getElementById('topics-container').innerHTML = "";
                window.addTopicField();
            }
        };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
    </script>
</body>
</html>
